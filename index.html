<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Checklist voyage debug</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f6efe6;--card:rgba(255,255,255,.78);--text:#231915;--muted:#7b6f67;--line:rgba(35,25,21,.1);--green:#0f766e;--orange:#ea7a56;--shadow:0 18px 50px rgba(54,34,22,.10)}*{box-sizing:border-box}body{margin:0;font-family:Inter,sans-serif;background:linear-gradient(180deg,var(--bg),#fbf8f4);color:var(--text)}.app{max-width:1200px;margin:0 auto;padding:20px}.panel{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow)}.hero{display:grid;grid-template-columns:1.2fr .8fr;gap:16px}.hero-main{padding:24px}.hero-side{padding:18px;display:grid;gap:12px}.title{font-size:2rem;font-weight:800;margin:0 0 10px}.lead{color:var(--muted);margin:0}.btn{border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px 14px;font-weight:700;cursor:pointer}.btn.primary{background:var(--text);color:#fff}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}.stat{padding:14px;background:#fff;border:1px solid var(--line);border-radius:16px}.sections{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:16px}.section{padding:16px;background:#fff}.section-title,.section-sub,.text{width:100%;border:0;outline:none;background:transparent;font:inherit}.section-title{font-size:1.08rem;font-weight:800}.section-sub{color:var(--muted);margin-top:4px}.item{display:grid;grid-template-columns:auto auto 1fr auto;gap:8px;align-items:center;padding:10px;border:1px solid var(--line);border-radius:12px;margin-top:8px}.log{margin-top:16px;padding:14px;background:#111;color:#d9f99d;border-radius:14px;white-space:pre-wrap;font-family:ui-monospace,monospace;min-height:120px}.small{font-size:.85rem;color:var(--muted)}@media(max-width:900px){.hero,.sections{grid-template-columns:1fr}}</style>
</head>
<body>
<div class="app">
  <div class="hero">
    <div class="panel hero-main">
      <h1 class="title">Checklist voyage debug</h1>
      <p class="lead">Version de diagnostic pour vérifier si Firebase écrit bien les changements.</p>
      <div class="actions">
        <button class="btn primary" id="forceSave">Forcer sauvegarde</button>
        <button class="btn" id="reloadBtn">Recharger Firebase</button>
        <button class="btn" id="resetBtn">Réinitialiser</button>
      </div>
      <div class="small" id="status">Statut: initialisation...</div>
    </div>
    <div class="panel hero-side">
      <div class="stat"><strong>Dernière erreur</strong><div id="lastErr" class="small">Aucune</div></div>
      <div class="stat"><strong>Dernière sauvegarde</strong><div id="lastSave" class="small">Jamais</div></div>
      <div class="stat"><strong>Chemin Firebase</strong><div class="small">checklists/voyage-philippines</div></div>
    </div>
  </div>
  <main class="sections" id="sections"></main>
  <div class="panel log" id="log"></div>
</div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getDatabase, ref, set, onValue } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';
const firebaseConfig={apiKey:'AIzaSyDoi-pFDglBgXdGv-OUJUtKl2c1XMs-8',authDomain:'checklist-voyage.firebaseapp.com',databaseURL:'https://checklist-voyage-default-rtdb.europe-west1.firebasedatabase.app',projectId:'checklist-voyage',storageBucket:'checklist-voyage.firebasestorage.app',messagingSenderId:'1034342281054',appId:'1:1034342281054:web:166654d5ef8d7588a229cf',measurementId:'G-JVYQSQHVPR'};
const path='checklists/voyage-philippines';
let data=[{title:'Catégorie test',subtitle:'Modifie le texte puis sauvegarde',items:[{label:'Premier élément',checked:false},{label:'Deuxième élément',checked:false}]},{title:'Autre catégorie',subtitle:'Pour tester le rechargement',items:[{label:'Élément A',checked:false}]}];
const app=initializeApp(firebaseConfig);const db=getDatabase(app);const root=ref(db,path);const $=id=>document.getElementById(id);let syncing=false;let timer=null;let loaded=false;function log(msg){$('log').textContent=`${new Date().toLocaleTimeString()} - ${msg}
`+$('log').textContent.slice(0,5000)}function err(msg){$('lastErr').textContent=msg;log('ERR: '+msg)}function ok(msg){$('lastSave').textContent=new Date().toLocaleTimeString();log('OK: '+msg)}function status(msg){$('status').textContent='Statut: '+msg}function esc(s){return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;')}function render(){const el=$('sections');el.innerHTML='';data.forEach((s,si)=>{const sec=document.createElement('section');sec.className='panel section';sec.innerHTML=`<input class="section-title" data-si="${si}" value="${esc(s.title)}"><input class="section-sub" data-si="${si}" value="${esc(s.subtitle)}"><div>${s.items.map((it,i)=>`<div class="item"><input type="checkbox" data-check="${si}:${i}" ${it.checked?'checked':''}><div>•</div><input class="text" data-item="${si}:${i}" value="${esc(it.label)}"><button data-del="${si}:${i}">×</button></div>`).join('')}</div>`;el.appendChild(sec)})}async function sync(){if(syncing)return;syncing=true;try{const payload={sections:data,updatedAt:Date.now()};log('SET '+JSON.stringify(payload).slice(0,300));await set(root,payload);ok('sauvegarde Firebase réussie');status('connecté')}catch(e){err(e?.message||String(e));status('erreur Firebase')}finally{syncing=false}}function schedule(){clearTimeout(timer);timer=setTimeout(sync,150)}$('sections').addEventListener('input',e=>{const t=e.target;if(t.matches('.section-title')){data[+t.dataset.si].title=t.value;schedule()}else if(t.matches('.section-sub')){data[+t.dataset.si].subtitle=t.value;schedule()}else if(t.matches('.text')){const[s,i]=t.dataset.item.split(':').map(Number);data[s].items[i].label=t.value;schedule()}});$('sections').addEventListener('change',e=>{const t=e.target;if(t.matches('[data-check]')){const[s,i]=t.dataset.check.split(':').map(Number);data[s].items[i].checked=t.checked;render();schedule()}});$('sections').addEventListener('click',e=>{const t=e.target.closest('button');if(!t)return;if(t.dataset.del){const[s,i]=t.dataset.del.split(':').map(Number);data[s].items.splice(i,1);render();schedule()}});$('forceSave').onclick=sync;$('reloadBtn').onclick=()=>location.reload();$('resetBtn').onclick=()=>{data=[{title:'Catégorie test',subtitle:'Modifie le texte puis sauvegarde',items:[{label:'Premier élément',checked:false},{label:'Deuxième élément',checked:false}]},{title:'Autre catégorie',subtitle:'Pour tester le rechargement',items:[{label:'Élément A',checked:false}]}];render();schedule()};onValue(root,snap=>{try{const v=snap.val();log('onValue reçu: '+JSON.stringify(v).slice(0,300));if(v?.sections){data=v.sections;loaded=true;render();status('données chargées depuis Firebase')}else if(!loaded){loaded=true;render();schedule();status('base vide, création...')}}catch(e){err('onValue: '+(e?.message||String(e)))}} ,e=>err('onValue listener: '+(e?.message||String(e))));window.addEventListener('error',e=>err(e.message||'window error'));window.addEventListener('unhandledrejection',e=>err(e.reason?.message||String(e.reason)));render();schedule();
</script>
</body>
</html>
